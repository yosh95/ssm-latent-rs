# NAB Anomaly Detection — Hybrid Statistical + JEPA Configuration (SOTA-optimized)
# 
# mode: "quick" = 4 representative datasets for fast iteration
#       "full"  = all datasets for final evaluation

[mode]
current = "quick"

[model]
d_model = 8           # minimal — just enough to encode [value, diff]
d_state = 4           # minimal state
expand = 2
n_heads = 2
mimo_rank = 1
n_layers = 1           # single layer — can't learn complex temporal patterns
use_conv = true
conv_kernel = 4

[train]
learning_rate = 1e-3
max_epochs = 300
probation_ratio = 0.15
early_stop_patience = 50

# JEPA loss weights — tuned for anomaly detection
[loss]
stability_weight = 0.001    # minimal VICReg, just enough to prevent collapse
curvature_weight = 0.0      # CRITICAL: zero — do NOT penalize trajectory bends (anomalies ARE bends)
recon_weight = 1.0          # reconstruction quality

# Anomaly score composition (hybrid: raw errors + statistical features)
[scoring]
alpha_recon = 1.0           # weight for reconstruction error
beta_latent = 0.5           # weight for latent prediction error  
gamma_obs = 0.5             # weight for observation prediction error
ema_alpha = 0.05            # EMA smoothing factor (low = stable)

# Anomaly score calibration 
[calibration]
k_mad = 3.0
alpha_ewma = 0.1
k_ewma = 3.0
guard_z = 3.5
threshold_decay = 0.001
power = 1.0                 # no power transform (raw is better)

# Datasets for quick mode (one from each category)
[datasets]
quick = [
    "realKnownCause/ambient_temperature_system_failure.csv",
    "realAWSCloudwatch/ec2_cpu_utilization_5f5533.csv",
    "artificialWithAnomaly/art_daily_jumpsdown.csv",
    "realTraffic/occupancy_t4013.csv",
]
