<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM Game Playing Demo</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f0f0f0;
        }
        canvas {
            background: #000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin: 20px;
        }
        .controls {
            margin: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Mamba + JEPA: Ball Catch Game</h1>
    <p id="status">Loading WASM...</p>
    <div class="controls">
        <button id="startButton">Start Training & Playing</button>
    </div>
    <canvas id="canvas" width="600" height="400"></canvas>
    
    <div style="max-width: 600px; line-height: 1.6;">
        <p><strong>Blue Circle:</strong> Actual Ball Position</p>
        <p><strong>Orange Circle:</strong> World Model's Prediction (Imagination)</p>
        <p>The agent learns physical laws from scratch through online training and tries to catch the ball by looking ahead.</p>
    </div>

    <script type="module">
        // Trunk will automatically handle the loading of the WASM file
    </script>
</body>
</html>
